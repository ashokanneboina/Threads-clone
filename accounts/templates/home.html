{% extends "base.html" %}
{% block content %}
    <div class="mobile-header">
        {% load static %}
        <img src="{% static 'images/svgs/threads_logo.svg' %}" alt="Threads">
    </div>
    <div class="mobile-nav-shell">
        {% include 'mobile_nav.html' %}
    </div>
    <div class="main-home">
        <div class="desktop-nav">
            {% include 'desktop_nav.html' %}
        </div>
        <div class="main-content">
            <div class="page-header">{% block title %}{% endblock %}</div>
            <div class="view-page">
                {% block main-content %}{% endblock %}
            </div>
        </div>
    </div>
    <div id="overlay" class="overlay hidden"></div>
    <div id="modal" class="modal hidden">
        <div class="modal-header">
            <span>Create Thread</span>
            <button id="closeModal" class="close-btn">×</button>
        </div>
        <div class="modal-body">
            <div class="user-row">
                <textarea id="threadText" placeholder="Start a thread..."></textarea>
            </div>
            <input type="file" id="threadImage">
        </div>
        <div class="actions">
            <button id="postBtn">Post</button>
        </div>
    </div>
    <script>const isAuthenticated = "{{ request.user.is_authenticated }}" === "True";</script>
{% endblock %}
